name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: mkdir -p tmp/cache/bun tmp/node-compile-cache tmp/playwright
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
        env:
          BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/tmp/cache/bun
          TMPDIR: ${{ github.workspace }}/tmp
      - run: bun run ci
        env:
          NODE_COMPILE_CACHE: ${{ github.workspace }}/tmp/node-compile-cache
          TMPDIR: ${{ github.workspace }}/tmp
      - run: bunx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/tmp/playwright
          TMPDIR: ${{ github.workspace }}/tmp
      - run: bun run test:browser
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/tmp/playwright
          TMPDIR: ${{ github.workspace }}/tmp
